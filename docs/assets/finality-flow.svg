<svg xmlns="http://www.w3.org/2000/svg" width="920" height="260" viewBox="0 0 920 260" role="img" aria-labelledby="title desc">
  <title id="title">BFT finality flow animation</title>
  <desc id="desc">A simple animated visualization of proposal, voting, quorum certificate, and finalization.</desc>
  <style>
    text { font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #172033; }
    .node { fill: #f8fafc; stroke: #334155; stroke-width: 2; }
    .label { font-size: 16px; font-weight: 600; }
    .small { font-size: 13px; fill: #475569; }
    .line { stroke: #94a3b8; stroke-width: 3; stroke-linecap: round; }
    .pulse { fill: #2563eb; opacity: 0; }
    .qc { fill: #16a34a; opacity: 0; }
    .final { fill: #dc2626; opacity: 0; }
    .phase { font-size: 18px; font-weight: 700; fill: #0f172a; }
    @keyframes pulse1 { 0%, 5% { opacity: 0; transform: translateX(0); } 15%, 25% { opacity: 1; } 35%, 100% { opacity: 0; transform: translateX(150px); } }
    @keyframes pulse2 { 0%, 35% { opacity: 0; transform: translateX(0); } 45%, 55% { opacity: 1; } 65%, 100% { opacity: 0; transform: translateX(150px); } }
    @keyframes pulse3 { 0%, 62% { opacity: 0; transform: translateX(0); } 72%, 82% { opacity: 1; } 92%, 100% { opacity: 0; transform: translateX(150px); } }
    @keyframes appearQc { 0%, 48% { opacity: 0; } 55%, 100% { opacity: 1; } }
    @keyframes appearFinal { 0%, 78% { opacity: 0; } 86%, 100% { opacity: 1; } }
    @keyframes phaseText { 0%, 30% { opacity: 1; } 31%, 100% { opacity: 0; } }
    @keyframes phaseText2 { 0%, 35% { opacity: 0; } 36%, 65% { opacity: 1; } 66%, 100% { opacity: 0; } }
    @keyframes phaseText3 { 0%, 68% { opacity: 0; } 69%, 100% { opacity: 1; } }
    #p1 { animation: pulse1 5s infinite ease-in-out; transform-origin: 155px 92px; }
    #p2 { animation: pulse2 5s infinite ease-in-out; transform-origin: 385px 92px; }
    #p3 { animation: pulse3 5s infinite ease-in-out; transform-origin: 615px 92px; }
    #qc { animation: appearQc 5s infinite ease-in-out; }
    #final { animation: appearFinal 5s infinite ease-in-out; }
    #phase1 { animation: phaseText 5s infinite ease-in-out; }
    #phase2 { animation: phaseText2 5s infinite ease-in-out; opacity: 0; }
    #phase3 { animation: phaseText3 5s infinite ease-in-out; opacity: 0; }
  </style>

  <rect x="0" y="0" width="920" height="260" fill="#ffffff"/>
  <text x="40" y="38" class="phase" id="phase1">1. proposer broadcasts payload</text>
  <text x="40" y="38" class="phase" id="phase2">2. validators vote and form 2f + 1 quorum</text>
  <text x="40" y="38" class="phase" id="phase3">3. certificate finalizes the decision</text>

  <line x1="155" y1="92" x2="300" y2="92" class="line"/>
  <line x1="385" y1="92" x2="530" y2="92" class="line"/>
  <line x1="615" y1="92" x2="760" y2="92" class="line"/>

  <circle id="p1" class="pulse" cx="155" cy="92" r="9"/>
  <circle id="p2" class="pulse" cx="385" cy="92" r="9"/>
  <circle id="p3" class="pulse" cx="615" cy="92" r="9"/>

  <rect class="node" x="55" y="65" width="120" height="55" rx="8"/>
  <text class="label" x="87" y="98">Payload</text>
  <text class="small" x="68" y="142">deterministic bytes</text>

  <rect class="node" x="285" y="65" width="120" height="55" rx="8"/>
  <text class="label" x="319" y="98">Votes</text>
  <text class="small" x="302" y="142">validators sign</text>

  <rect class="node" x="515" y="65" width="120" height="55" rx="8"/>
  <text class="label" x="546" y="98">Quorum</text>
  <text class="small" x="535" y="142">2f + 1 votes</text>

  <rect class="node" x="745" y="65" width="130" height="55" rx="8"/>
  <text class="label" x="775" y="98">Finalized</text>
  <text class="small" x="761" y="142">decision log append</text>

  <circle id="qc" class="qc" cx="575" cy="180" r="22"/>
  <text x="554" y="185" class="label" fill="#ffffff">QC</text>

  <circle id="final" class="final" cx="810" cy="180" r="22"/>
  <text x="795" y="185" class="label" fill="#ffffff">OK</text>
</svg>
