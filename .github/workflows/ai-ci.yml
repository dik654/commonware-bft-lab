name: AI CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  ci:
    name: rust quality gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@v2
        if: hashFiles('package.json') != '' || hashFiles('bun.lock') != '' || hashFiles('bun.lockb') != ''
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        if: hashFiles('package.json') != ''
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@stable
        if: hashFiles('Cargo.toml') != ''
      - uses: actions/setup-go@v5
        if: hashFiles('go.mod') != ''
        with:
          go-version: stable
      - name: Install dependencies
        run: |
          rustup show
      - name: AI quality static gates
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
        run: node scripts/ai-quality-gates.mjs --base "$BASE_SHA"
      - name: Lint
        run: |
          cargo fmt --check && cargo clippy --all-targets --all-features -- -D warnings
      - name: Typecheck
        run: |
          cargo check --all-targets --all-features
      - name: Test
        run: |
          cargo test --all-features
      - name: Build
        run: |
          cargo build --release
