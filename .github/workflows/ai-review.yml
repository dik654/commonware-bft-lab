name: AI Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify AI review integration
        env:
          AI_REVIEW_WEBHOOK_URL: ${{ secrets.AI_REVIEW_WEBHOOK_URL }}
        run: |
          if [ -z "$AI_REVIEW_WEBHOOK_URL" ]; then
            echo "AI_REVIEW_WEBHOOK_URL is not configured; skipping external AI review."
            exit 0
          fi
          payload=$(jq -n \
            --arg repo "${{ github.repository }}" \
            --arg pr "${{ github.event.pull_request.number }}" \
            --arg sha "${{ github.sha }}" \
            '{repo:$repo, pull_request:$pr, sha:$sha, event:"ai_review_requested"}')
          curl -fsS -X POST -H 'content-type: application/json' --data "$payload" "$AI_REVIEW_WEBHOOK_URL"
